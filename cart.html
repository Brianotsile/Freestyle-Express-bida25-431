<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Freestyles Express</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="page-background">

<header class="page-header">
    <h1>Your Cart 🛒</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="products.html">Products</a>
        <a href="login.html">Login</a>
    </nav>

    <nav>
        <div class="nav-links">
            <a href="login.html">Sign In</a>
            <a href="products.html">Orders</a>
            <a href="cart.html">Cart 🛒</a>
        </div>
    </nav>
</header>

<div class="container py-4">

  <h1 class="text-center mb-3 text-white">Your Cart 🛒</h1>

  <div class="glass-cart p-3">

    <div id="cartItems"></div>

    <hr>

    <div class="d-flex justify-content-between align-items-center">
      <h4 class="mb-0">Total: P<span id="total">0</span></h4>

      <span class="badge bg-dark fs-6">
        Items: <span class="quantity">0</span>
      </span>
    </div>

  </div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let cartItemsContainer = document.getElementById("cartItems");
let totalElement = document.getElementById("total");
let quantityElement = document.querySelector(".quantity");

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function changeQuantity(id, amount){
  let item = cart.find(p => p.id === id);
  if(!item) return;

  item.quantity += amount;

  if(item.quantity <= 0){
    cart = cart.filter(p => p.id !== id);
  }

  saveCart();
  renderCart();
}

function removeItem(id){
  cart = cart.filter(p => p.id !== id);
  saveCart();
  renderCart();
}

function renderCart(){

  cartItemsContainer.innerHTML = "";

  if(cart.length === 0){
    cartItemsContainer.innerHTML = `
      <div class="text-center text-muted py-3">
        Your cart is empty 🛍️
      </div>
    `;
    totalElement.innerText = 0;
    quantityElement.innerText = 0;
    return;
  }

  let total = 0;
  let totalQty = 0;

  cart.forEach(item => {

    total += item.price * item.quantity;
    totalQty += item.quantity;

    cartItemsContainer.innerHTML += `
      <div class="d-flex justify-content-between align-items-center border-bottom py-2">

        <div>
          <strong>${item.name}</strong><br>

          <div class="d-flex align-items-center gap-2 mt-1">
            <button class="btn btn-sm btn-dark" onclick="changeQuantity(${item.id}, -1)">-</button>
            <span>${item.quantity}</span>
            <button class="btn btn-sm btn-dark" onclick="changeQuantity(${item.id}, 1)">+</button>
          </div>
        </div>

        <div class="text-end">
          <div class="fw-bold">
            P${item.price * item.quantity}
          </div>
          <button class="btn btn-sm btn-danger mt-1" onclick="removeItem(${item.id})">
            Remove
          </button>
        </div>

      </div>
    `;
  });

  totalElement.innerText = total;
  quantityElement.innerText = totalQty;
}

renderCart();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
